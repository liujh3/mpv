name: build

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - ci
      - 'release/**'
    paths-ignore:
      - 'DOCS/**'
      - 'TOOLS/lua/**'
      - '.editorconfig'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE'
      - '.gitignore'
      - 'Copyright'
      - 'README.md'
      - 'RELEASE_NOTES'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'DOCS/**'
      - 'TOOLS/lua/**'
      - '.editorconfig'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE'
      - '.gitignore'
      - 'Copyright'
      - 'README.md'
      - 'RELEASE_NOTES'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # 仅保留原生 MSVC 编译环境（标准的 x64 架构）
  win32:
    runs-on: windows-2025-vs2026
    env:
      CC: "ccache clang"
      CXX: "ccache clang++"
      CC_LD: "lld-link"
      CXX_LD: "lld-link"
      RUST_LD: "lld-link"
      WINDRES: "llvm-rc"
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_DIR: "${{ github.workspace }}\\.ccache"
      CCACHE_MAXSIZE: 500M
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: "x64"
    steps:
      - name: Disable autocrlf
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@v6

      - name: Get time
        id: get_time
        run: |
          "timestamp=$((Get-Date).Ticks)" >> $env:GITHUB_OUTPUT

      - name: Restore cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ matrix.target }}-${{ steps.get_time.outputs.timestamp }}
          restore-keys: ${{ matrix.target }}-

      - name: Install dependencies
        run: |
          python -m pip install meson
          winget install --accept-source-agreements --accept-package-agreements Ccache.Ccache NASM.NASM
          echo "$env:LOCALAPPDATA\Microsoft\WinGet\Links" >> $env:GITHUB_PATH
          rustup default nightly

      - name: Update Meson WrapDB
        run: |
          meson wrap update-db
          # Explicitly download wraps, as nested projects may have older versions of them.
          meson wrap install expat
          meson wrap install harfbuzz
          meson wrap install libpng
          meson wrap install zlib

      # 抹除 Windows 任务栏的特殊行为
      - name: Clean Windows Taskbar Integration
        shell: pwsh
        run: |
          $win_src = "video/out/w32_common.c"
          if (Test-Path $win_src) {
              (Get-Content $win_src) `
                -replace 'SetCurrentProcessExplicitAppUserModelID', '//' `
                | Set-Content $win_src
              Write-Host "成功移除 Windows 任务栏媒体属性绑定。"
          }

      # ================= 插入这一步 =================
      - name: Commit Patches & Inject Custom Git Tag
        shell: pwsh
        run: |
          # 0. 强制将 PowerShell 本次会话的输出和标准字符串编码设为 UTF-8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8

          # 1. 配置临时 Git 身份（不配置无法 commit）
          git config --global user.email "bot@github.com"
          git config --global user.name "Workflow-Bot"
          
          # 2. 把修改过的 w32_common.c 本地提交，让仓库重回 "Clean" 状态（消灭 -dirty）
          git commit -am "Apply customized strip patches"
          
          # 3. 强行打上你想要的专属版本标签（消灭 7位哈希，直接用这个名字代替）
          git tag -f "LiveWallpaper定制版"
          
          Write-Host "Git 专属标签注入成功！"
      # ==============================================

      - name: Find Visual Studio
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw "Could not find a Visual Studio installation" }
          "VS=$vsPath" >> $env:GITHUB_ENV

      - name: Build
        id: build
        run: |
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -ne 'C:\Program Files\LLVM\bin' -and `
                                                             $_ -ne 'C:\Program Files\CMake\bin' -and `
                                                             $_ -ne 'C:\Strawberry\c\bin' }) -join ';'
          $env:PATH += ';C:\Program Files\NASM'
          Import-Module "$env:VS\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $env:VS -SkipAutomaticLocation -DevCmdArguments "-arch=${{ matrix.arch }} -host_arch=${{ matrix.arch }}"
          ./ci/build-win32.ps1

      - name: Print build log
        if: ${{ failure() && steps.build.outcome == 'failure' }}
        run: |
          cat ./build/meson-logs/meson-log.txt

      - name: Run meson tests
        id: tests
        run: |
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -ne 'C:\Program Files\LLVM\bin' -and `
                                                             $_ -ne 'C:\Program Files\CMake\bin' -and `
                                                             $_ -ne 'C:\Strawberry\c\bin' }) -join ';'
          $env:PATH += ';C:\Program Files\NASM'
          Import-Module "$env:VS\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $env:VS -SkipAutomaticLocation -DevCmdArguments "-arch=${{ matrix.arch }} -host_arch=${{ matrix.arch }}"
          meson test -C build -t 2

      - name: Print meson test log
        if: ${{ failure() && steps.tests.outcome == 'failure' }}
        run: |
          cat ./build/meson-logs/testlog.txt

      - name: Artifact name
        id: artifact
        run: |
          $VERSION_FILE = gci . -r -Filter "version.h" | ? { $_.FullName -match "[/\\]common[/\\]version\.h$" } | select -First 1 -exp FullName
          $VER = (sls $VERSION_FILE -Pattern 'VERSION').Line -replace '.*"([^"]+)".*', '$1'
          $PR = if ("${{ github.event.pull_request.number }}") { "-pr${{ github.event.pull_request.number }}" } else { "" }
          $name = "mpv-$VER$PR-${{ github.run_id }}-${{ matrix.target }}"
          "name=$name" >> $env:GITHUB_OUTPUT

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            build/mpv.???
            build/mpv-*.bat
            build/vulkan-*.dll
            !build/mpv.lib
            !build/mpv.pdb

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.name }}-pdb
          path: |
            build/mpv.pdb

      - name: Save Cache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ matrix.target }}-${{ steps.get_time.outputs.timestamp }}
